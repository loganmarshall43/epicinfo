<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Download the Epic Outdoors App">
  <meta property="og:description" content="Draw odds, deadlines, the digital magazine, podcast and more. Get the Epic Outdoors app for iPhone or Android.">
  <meta property="og:image" content="https://epictags.com/images/thumbnail1.jpg">
  <meta property="og:url" content="https://epictags.com/app/">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="/epicfavicon.png">
  <title>Download the Epic Outdoors App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #1c1c1e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #f5f5f7;
    }

    .container {
      max-width: 400px;
      width: 90%;
      text-align: center;
      padding: 20px;
    }

    .logo {
      max-width: 100%;
      height: auto;
      margin-bottom: 12px;
    }

    .tagline {
      color: #b1b1b1;
      font-size: 15px;
      line-height: 21px;
      margin-bottom: 24px;
    }

    .card {
      display: block;
      background: linear-gradient(145deg, #b1b1b1, #d4d4d4);
      border-radius: 8px;
      margin: 10px 0;
      padding: 18px 15px;
      transition: background-color 0.3s ease, transform 0.3s ease;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      font-weight: bold;
      text-decoration: none;
      color: #1c1c1e;
      font-size: 18px;
      cursor: pointer;
    }

    .card:hover {
      background: linear-gradient(145deg, #d4d4d4, #b1b1b1);
      transform: scale(1.05);
    }

    .note {
      color: #b1b1b1;
      font-size: 13px;
      margin-top: 18px;
    }

    @media(min-width: 768px) {
      .container {
        max-width: 600px;
      }

      .card {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="/images/HeaderLogo.png" alt="Epic Outdoors" class="logo">

    <p class="tagline">
      Get the Epic Outdoors member app. Draw odds, deadlines, the digital
      magazine, podcast and more.
    </p>

    <a class="card" href="https://apps.apple.com/us/app/id6779708899">
      Download for iPhone
    </a>

    <a class="card" href="https://play.google.com/store/apps/details?id=com.epicoutdoors.memberportal">
      Download for Android
    </a>

    <p class="note" id="redirectNote" style="display: none;">
      Taking you to the store...
    </p>
  </div>

  <script>
    // Phones coming from the text blast skip the tap entirely: detect the
    // platform and bounce straight to the right store. Desktop and unknown
    // devices just see the two buttons above.
    (function () {
      var ua = navigator.userAgent || "";
      // iPadOS 13+ reports a Mac user agent; the touch check catches it.
      var isIOS = /iPhone|iPad|iPod/i.test(ua) ||
        (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1);
      var isAndroid = /Android/i.test(ua);
      var url = isIOS
        ? "https://apps.apple.com/us/app/id6779708899"
        : isAndroid
          ? "https://play.google.com/store/apps/details?id=com.epicoutdoors.memberportal"
          : "";
      if (url) {
        document.getElementById("redirectNote").style.display = "block";
        window.location.replace(url);
      }
    })();
  </script>
</body>

</html>
